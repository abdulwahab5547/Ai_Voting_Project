{% extends "base.html" %}
{% block title %}Vote Recorded{% endblock %}
{% block content %}
<section class="auth-wrap">
  <div class="card thanks-card">
    <div class="check-mark">OK</div>
    <h1>Thank you, {{ voter_name }}</h1>
    <p class="muted">Your vote for <strong>{{ candidate.name }}</strong> ({{ candidate.party }}) has been recorded.</p>
    <a href="{{ url_for('home.index') }}" class="btn btn-primary">Back to Home</a>
  </div>
</section>
{% endblock %}
